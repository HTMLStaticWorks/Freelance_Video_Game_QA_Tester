<!DOCTYPE html>
<html lang="en" data-theme="dark" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — QA Studio</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/main.css">
</head>
<body class="auth-page">
  <div class="auth-card">
    <div class="auth-top-icons">
      <button class="icon-btn" id="rtl-toggle" title="Toggle RTL" aria-label="Toggle RTL">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12h-8"/><path d="M21 12l-4-4"/><path d="M21 12l-4 4"/><path d="M3 6h6"/><path d="M3 12h6"/><path d="M3 18h6"/></svg>
      </button>
      <button class="icon-btn" id="theme-toggle" title="Toggle Theme" aria-label="Toggle Theme">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
      </button>
    </div>

    <a href="index.html" class="auth-logo" style="text-decoration:none;">
      <svg class="brand-icon" viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg" style="width:36px; height:36px; margin-right:12px;">
        <rect width="36" height="36" rx="8" fill="url(#bh1_auth)"/>
        <path d="M10 18h16M18 10v16" stroke="#fff" stroke-width="3" stroke-linecap="round"/>
        <circle cx="14" cy="14" r="2" fill="#00f0ff"/>
        <circle cx="22" cy="22" r="2" fill="#ec4899"/>
        <defs><linearGradient id="bh1_auth" x1="0" y1="0" x2="36" y2="36" gradientUnits="userSpaceOnUse">
          <stop stop-color="#00f0ff"/><stop offset="1" stop-color="#8b5cf6"/>
        </linearGradient></defs>
      </svg>
      QA<span>STUDIO</span>
    </a>

    <form onsubmit="event.preventDefault(); window.location.href='dashboard.html';">
      <div class="form-group">
        <label class="form-label">Email</label>
        <input type="email" class="form-control" placeholder="you@studio.com" required>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <div class="password-wrap">
          <input type="password" class="form-control" placeholder="Enter password" required>
          <button type="button" class="password-toggle" aria-label="Toggle password visibility">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
      </div>
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:22px;font-size:0.85rem;">
        <label style="display:flex;align-items:center;gap:8px;color:var(--text-muted);cursor:pointer;">
          <input type="checkbox" style="accent-color:var(--accent-cyan);"> Remember Me
        </label>
        <a href="#" style="font-size:0.85rem;">Forgot Password?</a>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;margin-bottom:18px;">Login</button>
    </form>

    <div class="auth-divider"><span>OR</span></div>

    <div class="social-login">
      <button class="social-btn" onclick="window.location.href='dashboard.html'">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
        Google
      </button>
      <button class="social-btn" onclick="window.location.href='dashboard.html'">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 9a5 5 0 0 0-4-3h-4a5 5 0 0 0-4 3"/><path d="M6 9v8a2 2 0 0 0 2 2h8a2 2 0 0 0 2-2V9"/><path d="M9 18v3"/><path d="M15 18v3"/><circle cx="9" cy="12" r="1"/><circle cx="15" cy="12" r="1"/></svg>
        Discord
      </button>
      <button class="social-btn" onclick="window.location.href='dashboard.html'">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="4"/><path d="M12 2v4"/><path d="M12 18v4"/><path d="m4.93 4.93 2.83 2.83"/><path d="m16.24 16.24 2.83 2.83"/><path d="M2 12h4"/><path d="M18 12h4"/><path d="m4.93 19.07 2.83-2.83"/><path d="m16.24 7.76 2.83-2.83"/></svg>
        Steam
      </button>
    </div>

    <p style="text-align:center;margin-top:22px;font-size:0.9rem;color:var(--text-muted);">
      Don't have an account? <a href="register.html" style="font-weight:600;">Register</a>
    </p>
  </div>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
